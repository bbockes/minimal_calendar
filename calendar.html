        function getDaysInMonth(year, month) {
            return new Date(year, month + 1, 0).getDate();
        }

        function getFirstDayOfMonth(year, month) {
            return new Date(year, month, 1).getDay();
        }

        function renderYearSlider() {
            const slider = document.getElementById('slider');
            slider.innerHTML = '';
            slider.style.display = 'none';
        }


        function renderMonthSlider(month) {
            const slider = document.getElementById('slider');
            slider.innerHTML = '';
            slider.className = 'slider';
            
            // Months only
            for (let m = 0; m < 12; m++) {
                const monthItem = document.createElement('span');
                if (m === month) {
                    monthItem.className = 'slider-item selected';
                } else {
                    monthItem.className = 'slider-item greyed';
                    monthItem.onclick = () => renderYearView();
                }
                monthItem.textContent = monthNames[m];
                slider.appendChild(monthItem);
                
                if (m < 11) {
                    const sep = document.createElement('span');
                    sep.className = 'slider-separator';
                    sep.textContent = '>';
                    slider.appendChild(sep);
                }
            }
        }

        function renderDaySlider(month, day) {
            const slider = document.getElementById('slider');
            slider.innerHTML = '';
            slider.className = 'slider';
            
            const daysInMonth = getDaysInMonth(2026, month);
            
            // Days only
            for (let d = 1; d <= daysInMonth; d++) {
                const dayItem = document.createElement('span');
                if (d === day) {
                    dayItem.className = 'slider-item selected';
                } else {
                    dayItem.className = 'slider-item greyed';
                    if (currentMode === 'habits' || currentMode === 'journal') {
                        dayItem.onclick = () => renderDayView(month, d);
                    }
                }
                dayItem.textContent = d;
                slider.appendChild(dayItem);
                
                if (d < daysInMonth) {
                    const sep = document.createElement('span');
                    sep.className = 'slider-separator';
                    sep.textContent = '>';
                    slider.appendChild(sep);
                }
            }
        }

        function renderYearView() {
            currentView = 'year';
            const titleElement = document.getElementById('title');
            const titleSpan = titleElement.querySelector('span');
            if (titleSpan) {
                titleSpan.textContent = '2026';
            } else {
                // Fallback if structure is different
                titleElement.innerHTML = '<span>2026</span>';
            }
            renderYearSlider();
            document.getElementById('navigation').style.display = 'none';
            
            const calendar = document.getElementById('calendar');
            calendar.className = 'year-view-container';
            calendar.innerHTML = '';
            
            const yearView = document.createElement('div');
            yearView.className = 'year-view';

            // Create 12 month columns
            for (let month = 0; month < 12; month++) {
                const monthCol = document.createElement('div');
                monthCol.className = 'month-column';

                const header = document.createElement('div');
                header.className = 'month-header';
                header.textContent = monthAbbr[month];
                monthCol.appendChild(header);

                const daysInMonth = getDaysInMonth(2026, month);
                const firstDay = getFirstDayOfMonth(2026, month);

                // Create rows for each day
                for (let day = 1; day <= daysInMonth; day++) {
                    const dayRow = document.createElement('div');
                    dayRow.className = 'day-row';
                    dayRow.style.cursor = 'pointer';
                    
                    // Check if this is today's date
                    const now = new Date();
                    const today = (now.getFullYear() === 2026) 
                        ? new Date(2026, now.getMonth(), now.getDate())
                        : new Date(2026, 1, 2); // Feb 2, 2026 as reference
                    if (2026 === today.getFullYear() && month === today.getMonth() && day === today.getDate()) {
                        dayRow.classList.add('today');
                        // Apply color to the border based on current mode
                        if (currentMode === 'habits' && selectedHabitId) {
                            const habitColor = getSelectedHabitColor();
                            if (habitColor) {
                                dayRow.style.setProperty('--today-border-color', habitColor);
                            }
                        } else if (currentMode === 'events' && selectedCalendarId) {
                            const calendarColor = getSelectedCalendarColor();
                            if (calendarColor) {
                                dayRow.style.setProperty('--today-border-color', calendarColor);
                            }
                        }
                    }
                    
                    // Check if date is marked based on current mode
                    if (currentMode === 'habits') {
                        if (selectedHabitId && isDateMarked(2026, month, day, selectedHabitId)) {
                            applyHabitColorToCell(dayRow);
                        } else if (!selectedHabitId && isDateMarked(2026, month, day)) {
                            // Show marked if any habit has this date marked (use default green)
                            dayRow.classList.add('marked');
                        }
                    } else if (currentMode === 'events') {
                        // Events mode
                        if (selectedCalendarId) {
                            const dateKey = `calendar-${selectedCalendarId}-2026-${month + 1}-${day}`;
                            const eventKey = getEventKey(selectedCalendarId, 2026, month, day);
                            const hasEvents = events.some(e => e.key === eventKey);
                            
                            if (localStorage.getItem(dateKey) === 'true' || hasEvents) {
                                const calendar = calendars.find(c => c.id === selectedCalendarId);
                                if (calendar) {
                                    const color = getCalendarColor(calendar);
                                    dayRow.style.backgroundColor = color;
                                    dayRow.style.color = '#fff';
                                    dayRow.classList.add('marked');
                                }
                            }
                        }
                    } else if (currentMode === 'journal') {
                        // Journal mode - highlight days with journal entries
                        const dateKey = `2026-${month + 1}-${day}`;
                        const journalEntry = localStorage.getItem(dateKey);
                        if (journalEntry && journalEntry.trim() !== '') {
                            // Use the same dark green color as habits mode
                            dayRow.style.backgroundColor = '#2D5A4A';
                            dayRow.style.color = '#fff';
                            dayRow.classList.add('marked');
                        }
                    }
                    
                    // Store date info on element for drag operations
                    dayRow.dataset.year = '2026';
                    dayRow.dataset.month = month;
                    dayRow.dataset.day = day;
                    
                    dayRow.onmousedown = (e) => {
                        e.stopPropagation();
                        if (currentMode === 'habits' && habitTrackerEnabled && selectedHabitId) {
                            mouseDownPos = { x: e.clientX, y: e.clientY };
                            hasMoved = false;
                            dragStartCell = { month, day };
                            dragStartState = isDateMarked(2026, month, day, selectedHabitId);
                        } else if (currentMode === 'events' && selectedCalendarId) {
                            mouseDownPos = { x: e.clientX, y: e.clientY };
                            hasMoved = false;
                            dragStartCell = { month, day };
                            const dateKey = `calendar-${selectedCalendarId}-2026-${month + 1}-${day}`;
                            dragStartState = localStorage.getItem(dateKey) === 'true';
                        }
                    };
                    
                    dayRow.onmousemove = (e) => {
                        if (currentMode === 'habits' && mouseDownPos && habitTrackerEnabled && selectedHabitId) {
                            const distance = Math.abs(e.clientX - mouseDownPos.x) + Math.abs(e.clientY - mouseDownPos.y);
                            if (distance > 5) {
                                if (!hasMoved) {
                                    hasMoved = true;
                                    isDragging = true;
                                    dragProcessedCells.clear();
                                    toggleDateMarked(2026, month, day, selectedHabitId);
                                    toggleCellWithHabitColor(dayRow);
                                    updateMarkTodayButton();
                                    dragStartState = !dragStartState;
                                    dragProcessedCells.add(`${month}-${day}`);
                                }
                            }
                        } else if (currentMode === 'events' && mouseDownPos && selectedCalendarId) {
                            const distance = Math.abs(e.clientX - mouseDownPos.x) + Math.abs(e.clientY - mouseDownPos.y);
                            if (distance > 5) {
                                if (!hasMoved) {
                                    hasMoved = true;
                                    isDragging = true;
                                    dragProcessedCells.clear();
                                    const dateKey = `calendar-${selectedCalendarId}-2026-${month + 1}-${day}`;
                                    const currentlyMarked = localStorage.getItem(dateKey) === 'true';
                                    localStorage.setItem(dateKey, (!currentlyMarked).toString());
                                    const calendar = calendars.find(c => c.id === selectedCalendarId);
                                    if (calendar) {
                                        const color = getCalendarColor(calendar);
                                        if (!currentlyMarked) {
                                            dayRow.style.backgroundColor = color;
                                            dayRow.style.color = '#fff';
                                            dayRow.classList.add('marked');
                                        } else {
                                            dayRow.style.backgroundColor = '';
                                            dayRow.style.color = '';
                                            dayRow.classList.remove('marked');
                                        }
                                    }
                                    dragStartState = !dragStartState;
                                    dragProcessedCells.add(`${month}-${day}`);
                                }
                            }
                        }
                    };
                    
                    dayRow.onmouseenter = (e) => {
                        if (isDragging && currentMode === 'habits' && habitTrackerEnabled && selectedHabitId) {
                            handleCellDragOver(2026, month, day);
                        }
                        // Drag handling for events mode can be added here if needed
                    };
                    
                    dayRow.onclick = async (e) => {
                        e.stopPropagation();
                        if (!hasMoved && !isDragging) {
                            if (currentMode === 'habits') {
                                if (habitTrackerEnabled && selectedHabitId) {
                                    toggleDateMarked(2026, month, day, selectedHabitId);
                                    toggleCellWithHabitColor(dayRow);
                                    updateMarkTodayButton();
                                } else if (habitTrackerEnabled && !selectedHabitId) {
                                    await showCustomAlert('Please select a habit first', 'Notification');
                                } else {
                                    renderDayView(month, day);
                                }
                            } else if (currentMode === 'events') {
                                // Events mode
                                if (selectedCalendarId) {
                                    // Open event creation modal
                                    openEventModal(month, day);
                                } else {
                                    await showCustomAlert('Please select a calendar first', 'Notification');
                                }
                            } else if (currentMode === 'journal') {
                                // Journal mode - always open day view modal
                                renderDayView(month, day);
                            }
                        }
                    };

                    const dayNum = document.createElement('div');
                    dayNum.className = 'day-number';
                    dayNum.textContent = day;
                    dayRow.appendChild(dayNum);

                    const dayName = document.createElement('div');
                    dayName.className = 'day-name';
                    const date = new Date(2026, month, day);
                    dayName.textContent = dayAbbr[date.getDay()];
                    dayRow.appendChild(dayName);

                    monthCol.appendChild(dayRow);
                }

                yearView.appendChild(monthCol);
            }
            
            calendar.appendChild(yearView);
        }

        function renderMonthView(month) {
            // Always render year view instead of month view
            renderYearView();
            return;

            const calendar = document.getElementById('calendar');
            calendar.className = 'month-view';
            calendar.innerHTML = '';

            // Add back button
            const backBtn = document.createElement('button');
            backBtn.className = 'back-btn';
            backBtn.textContent = '← Back to Year';
            backBtn.onclick = renderYearView;
            calendar.appendChild(backBtn);

            const container = document.createElement('div');
            container.className = 'month-container';

            const grid = document.createElement('div');
            grid.className = 'calendar-grid';

            const firstDay = getFirstDayOfMonth(2026, month);
            const daysInMonth = getDaysInMonth(2026, month);

            // Day labels - rotate to start with the first day of the month
            const rotatedDayNames = [];
            for (let i = 0; i < 7; i++) {
                rotatedDayNames.push(dayNames[(firstDay + i) % 7]);
            }
            
            rotatedDayNames.forEach(day => {
                const label = document.createElement('div');
                label.className = 'day-label';
                label.textContent = day;
                grid.appendChild(label);
            });

            // Days of the month (starting from the far left)
            let lastDayDiv = null;
            for (let day = 1; day <= daysInMonth; day++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day';
                dayDiv.textContent = day;
                
                // Check if date is marked for selected habit and apply styling
                if (selectedHabitId && isDateMarked(2026, month, day, selectedHabitId)) {
                    applyHabitColorToCell(dayDiv);
                } else if (!selectedHabitId && isDateMarked(2026, month, day)) {
                    // Show marked if any habit has this date marked (use default green)
                    dayDiv.classList.add('marked');
                }
                
                const currentDayNum = day;
                
                // Store date info on element for drag operations
                dayDiv.dataset.year = '2026';
                dayDiv.dataset.month = month;
                dayDiv.dataset.day = currentDayNum;
                
                dayDiv.onmousedown = (e) => {
                    e.stopPropagation();
                    if (habitTrackerEnabled && selectedHabitId) {
                        mouseDownPos = { x: e.clientX, y: e.clientY };
                        hasMoved = false;
                        dragStartCell = { month, day: currentDayNum };
                        dragStartState = isDateMarked(2026, month, currentDayNum, selectedHabitId);
                    }
                };
                
                dayDiv.onmousemove = (e) => {
                    if (mouseDownPos && habitTrackerEnabled && selectedHabitId) {
                        const distance = Math.abs(e.clientX - mouseDownPos.x) + Math.abs(e.clientY - mouseDownPos.y);
                        if (distance > 5) { // Threshold to start dragging
                            if (!hasMoved) {
                                hasMoved = true;
                                isDragging = true;
                                dragProcessedCells.clear();
                                // Toggle starting cell
                                toggleDateMarked(2026, month, currentDayNum, selectedHabitId);
                                toggleCellWithHabitColor(dayDiv);
                                updateMarkTodayButton();
                                dragStartState = !dragStartState; // Update after toggle
                                dragProcessedCells.add(`${month}-${currentDayNum}`);
                            }
                        }
                    }
                };
                
                dayDiv.onmouseenter = (e) => {
                    if (isDragging && habitTrackerEnabled && selectedHabitId) {
                        handleCellDragOver(2026, month, currentDayNum);
                    }
                };
                
                dayDiv.onclick = async (e) => {
                    e.stopPropagation();
                    if (!hasMoved && !isDragging) {
                        if (habitTrackerEnabled && selectedHabitId) {
                            // Toggle state for selected habit
                            toggleDateMarked(2026, month, currentDayNum, selectedHabitId);
                            toggleCellWithHabitColor(dayDiv);
                            updateMarkTodayButton();
                        } else if (habitTrackerEnabled && !selectedHabitId) {
                            await showCustomAlert('Please select a habit first', 'Notification');
                        } else if (currentMode === 'habits') {
                            // Normal behavior - open day view (only in habits mode)
                            renderDayView(month, currentDayNum);
                        } else if (currentMode === 'journal') {
                            // Journal mode - always open day view
                            renderDayView(month, currentDayNum);
                        }
                        // In events mode, do nothing if edit tracker is off
                    }
                };
                grid.appendChild(dayDiv);
                lastDayDiv = dayDiv;
            }

            // Fill remaining cells in the last row with empty cells
            const remainingCells = (7 - (daysInMonth % 7)) % 7;
            if (remainingCells > 0 && lastDayDiv) {
                lastDayDiv.classList.add('before-empty');
            }
            for (let i = 0; i < remainingCells; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'day empty';
                grid.appendChild(emptyDiv);
            }

            container.appendChild(grid);
            calendar.appendChild(container);
        }

        function renderDayView(month, day) {
            currentView = 'day';
            currentMonth = month;
            currentDay = day;

            const date = new Date(2026, month, day);
            const dayName = dayNames[date.getDay()];
            const dateKey = `2026-${month + 1}-${day}`;
            
            // Get saved notes from localStorage
            const savedNotes = localStorage.getItem(dateKey) || '';

            const modal = document.getElementById('dayModal');
            const dayViewContent = document.getElementById('dayViewContent');
            
            dayViewContent.innerHTML = `
                <button class="modal-close" onclick="closeDayModal()">×</button>
                <div class="day-header">
                    <div class="day-date">${monthNames[month]} ${day}, 2026</div>
                </div>
                <div class="day-content">
                    <textarea 
                        class="notes-input" 
                        id="dayNotes"
                        placeholder="${currentMode === 'journal' ? 'What did you do today? What did you learn?' : 'What did you do today? Learn anything new?'}"
                        data-date="${dateKey}"
                    >${savedNotes}</textarea>
                    <div class="day-actions">
                        <button class="day-view-btn danger" onclick="clearDayNotes()">Clear All</button>
                        <button class="day-view-btn primary" onclick="closeDayModal()">Done</button>
                    </div>
                </div>
            `;
            
            // Add event listener to save notes
            const notesInput = document.getElementById('dayNotes');
            notesInput.addEventListener('input', (e) => {
                const dateKey = e.target.getAttribute('data-date');
                localStorage.setItem(dateKey, e.target.value);
                // If in journal mode, re-render to update highlighting
                if (currentMode === 'journal') {
                    renderYearView();
                }
            });
            
            // Add Enter key handler (Ctrl+Enter or Cmd+Enter to save)
            notesInput.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    closeDayModal();
                }
            });
            
            modal.classList.add('active');
            document.body.classList.add('modal-open');
        }

        function clearDayNotes() {
            const notesInput = document.getElementById('dayNotes');
            if (notesInput) {
                const dateKey = notesInput.getAttribute('data-date');
                notesInput.value = '';
                localStorage.setItem(dateKey, '');
                // If in journal mode, re-render to update highlighting
                if (currentMode === 'journal') {
                    renderYearView();
                }
            }
        }

        function closeDayModal() {
            const modal = document.getElementById('dayModal');
            modal.classList.remove('active');
            document.body.classList.remove('modal-open');
            currentView = currentView === 'year' ? 'year' : 'month';
            // If in journal mode, re-render to update highlighting
            if (currentMode === 'journal') {
                renderYearView();
            }
        }

        // Make clearDayNotes available globally
        window.clearDayNotes = clearDayNotes;

        // Event management functions
        function loadEvents() {
            const saved = localStorage.getItem('events');
            events = saved ? JSON.parse(saved) : [];
        }

        function saveEvents() {
            localStorage.setItem('events', JSON.stringify(events));
        }

        // Export all calendar data to a JSON file (habits, events, calendars, journal, marked dates)
        function exportData() {
            const data = {};
            const keys = Object.keys(localStorage);
            keys.forEach(key => {
                if (key === 'habits' || key === 'habitTrackerEnabled' || key === 'currentMode' || key === 'calendars' || key === 'events' ||
                    key.startsWith('habit-') || key.startsWith('calendar-') || /^2026-\d{1,2}-\d{1,2}$/.test(key)) {
                    data[key] = localStorage.getItem(key);
                }
            });
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'minimal-calendar-backup-' + new Date().toISOString().slice(0, 10) + '.json';
            a.click();
            URL.revokeObjectURL(a.href);
        }

        function importData() {
            document.getElementById('importDataInput').click();
        }

        function handleImportFile(e) {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (typeof data !== 'object' || data === null) throw new Error('Invalid format');
                    const keys = Object.keys(data);
                    keys.forEach(key => {
                        if (typeof data[key] === 'string') localStorage.setItem(key, data[key]);
                    });
                    location.reload();
                } catch (err) {
                    showCustomAlert('Could not import: ' + (err.message || 'invalid file'), 'Import failed');
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        }

        function getEventKey(calendarId, year, month, day) {
            return `event-${calendarId}-${year}-${month + 1}-${day}`;
        }

        function getEventsForDate(calendarId, year, month, day) {
            const eventKey = getEventKey(calendarId, year, month, day);
            return events.filter(e => e.key === eventKey);
        }

        function saveEvent(event) {
            // Remove existing event with same ID if updating
            events = events.filter(e => e.id !== event.id);
            events.push(event);
            saveEvents();
            
            // Mark the date as having events
            const dateKey = `calendar-${event.calendarId}-${event.year}-${event.month + 1}-${event.day}`;
            localStorage.setItem(dateKey, 'true');
            
            renderYearView();
        }

        function deleteEvent(eventId) {
            const event = events.find(e => e.id === eventId);
            if (event) {
                events = events.filter(e => e.id !== eventId);
                saveEvents();
                
                // Check if there are other events on this date
                const dateKey = getEventKey(event.calendarId, event.year, event.month, event.day);
                const remainingEvents = events.filter(e => e.key === dateKey);
                if (remainingEvents.length === 0) {
                    // No more events, unmark the date
                    const calendarDateKey = `calendar-${event.calendarId}-${event.year}-${event.month + 1}-${event.day}`;
                    localStorage.removeItem(calendarDateKey);
                }
                
                renderYearView();
            }
        }

        let selectedEventId = null;

        function openEventModal(month, day) {
            if (!selectedCalendarId) return;
            
            const year = 2026;
            const date = new Date(year, month, day);
            const eventKey = getEventKey(selectedCalendarId, year, month, day);
            const existingEvents = events.filter(e => e.key === eventKey);
            selectedEventId = null;
            
            const modal = document.getElementById('eventModal');
            const eventViewContent = document.getElementById('eventViewContent');
            
            let eventsHTML = '';
            if (existingEvents.length > 0) {
                existingEvents.forEach(event => {
                    eventsHTML += `
                        <div class="event-card" data-event-id="${event.id}">
                            <div class="event-card-title">${event.name || 'Untitled Event'}</div>
                            ${event.time ? `<div class="event-card-detail">⏰ ${event.time}</div>` : ''}
                            ${event.location && event.location !== 'n/a' ? `<div class="event-card-detail">📍 ${event.location}</div>` : ''}
                            ${event.notes ? `<div class="event-card-notes">${event.notes}</div>` : ''}
                            <div class="event-card-actions">
                                <button class="event-btn" style="padding: 6px 12px; font-size: 12px; border-color: #639A88; color: #639A88;" onclick="editEvent('${event.id}')">Edit</button>
                                <button class="event-btn danger" style="padding: 6px 12px; font-size: 12px;" onclick="deleteEventById('${event.id}')">Delete</button>
                            </div>
                        </div>
                    `;
                });
            } else {
                eventsHTML = '<div style="padding: 40px; color: #999;">No events for this date</div>';
            }
            
            eventViewContent.innerHTML = `
                <button class="modal-close" onclick="closeEventModal()">×</button>
                <div class="event-header">
                    <div class="event-date">${monthNames[month]} ${day}, 2026</div>
                </div>
                <div class="event-content-wrapper">
                    <div class="event-content">
                        <div style="font-size: 16px; font-weight: 600; margin-bottom: 10px; color: #333;">Events</div>
                        <div class="events-list">
                            ${eventsHTML}
                        </div>
                    </div>
                    <div class="event-form-container">
                        <button class="add-event-btn-side" id="addEventBtn" onclick="showEventForm()">+ Add New Event</button>
                        <div class="event-form-section" id="eventFormSection">
                            <div id="eventFormTitle" style="font-size: 16px; font-weight: 600; margin-bottom: 10px; color: #333;">New Event</div>
                            <div class="event-field">
                                <label for="eventName">Event Name</label>
                                <input type="text" id="eventName" placeholder="Enter event name..." />
                            </div>
                            <div class="event-field">
                                <label for="eventTime">Time</label>
                                <input type="text" id="eventTime" placeholder="e.g., 2:00 PM, all day, etc." />
                            </div>
                            <div class="event-field">
                                <label for="eventLocation">Location</label>
                                <input type="text" id="eventLocation" placeholder="Enter location..." />
                            </div>
                            <div class="event-field">
                                <label for="eventNotes">Notes</label>
                                <textarea id="eventNotes" placeholder="Additional notes..."></textarea>
                            </div>
                            <div class="event-actions" style="margin-top: auto;">
                                <button class="event-btn" onclick="hideEventForm()">Cancel</button>
                                <button class="event-btn primary" id="saveEventBtn" onclick="saveEventFromModal(${year}, ${month}, ${day})">Save Event</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            modal.classList.add('active');
            document.body.classList.add('modal-open');
        }

        function editEvent(eventId) {
            const event = events.find(e => e.id === eventId);
            if (!event) return;
            
            // Remove editing class from all event cards
            document.querySelectorAll('.event-card').forEach(card => {
                card.classList.remove('editing');
            });
            
            // Add editing class to the selected event card
            const eventCard = document.querySelector(`[data-event-id="${eventId}"]`);
            if (eventCard) {
                eventCard.classList.add('editing');
            }
            
            // Populate the form with event data
            document.getElementById('eventName').value = event.name || '';
            document.getElementById('eventTime').value = event.time || '';
            document.getElementById('eventLocation').value = event.location || '';
            document.getElementById('eventNotes').value = event.notes || '';
            
            // Hide the "Add New Event" button
            const addBtn = document.querySelector('.add-event-btn-side');
            if (addBtn) {
                addBtn.style.display = 'none';
            }
            
            // Show the form
            showEventForm();
            
            // Store the event ID being edited
            window.editingEventId = eventId;
            
            // Update the form title and save button
            const formTitle = document.getElementById('eventFormTitle');
            if (formTitle) {
                formTitle.textContent = 'Edit Event';
            }
            const saveBtn = document.getElementById('saveEventBtn');
            if (saveBtn) {
                saveBtn.textContent = 'Update Event';
            }
        }

        function showEventForm() {
            const formSection = document.getElementById('eventFormSection');
            if (formSection) {
                formSection.classList.add('active');
                const eventNameInput = document.getElementById('eventName');
                if (eventNameInput) {
                    eventNameInput.focus();
                }
            }
        }

        function hideEventForm() {
            const formSection = document.getElementById('eventFormSection');
            if (formSection) {
                formSection.classList.remove('active');
                // Clear form
                document.getElementById('eventName').value = '';
                document.getElementById('eventTime').value = '';
                document.getElementById('eventLocation').value = '';
                document.getElementById('eventNotes').value = '';
                // Remove editing class from all event cards
                document.querySelectorAll('.event-card').forEach(card => {
                    card.classList.remove('editing');
                });
                // Reset editing state
                window.editingEventId = null;
                // Show the "Add New Event" button again
                const addBtn = document.querySelector('.add-event-btn-side');
                if (addBtn) {
                    addBtn.style.display = '';
                }
                // Reset form title and save button text
                const formTitle = document.getElementById('eventFormTitle');
                if (formTitle) {
                    formTitle.textContent = 'New Event';
                }
                const saveBtn = document.getElementById('saveEventBtn');
                if (saveBtn) {
                    saveBtn.textContent = 'Save Event';
                }
            }
        }

        // Make functions available globally
        window.editEvent = editEvent;
        window.showEventForm = showEventForm;
        window.hideEventForm = hideEventForm;

        function closeEventModal() {
            const modal = document.getElementById('eventModal');
            modal.classList.remove('active');
            document.body.classList.remove('modal-open');
        }

        function saveEventFromModal(year, month, day) {
            if (!selectedCalendarId) return;
            
            const name = document.getElementById('eventName').value.trim();
            const time = document.getElementById('eventTime').value.trim();
            const location = document.getElementById('eventLocation').value.trim();
            const notes = document.getElementById('eventNotes').value.trim();
            
            if (!name) {
                showCustomAlert('Please enter an event name', 'Notification');
                return;
            }
            
            const eventKey = getEventKey(selectedCalendarId, year, month, day);
            
            // Check if we're editing an existing event
            if (window.editingEventId) {
                const existingEvent = events.find(e => e.id === window.editingEventId);
                if (existingEvent) {
                    // Update existing event
                    existingEvent.name = name;
                    existingEvent.time = time;
                    existingEvent.location = location;
                    existingEvent.notes = notes;
                    saveEvents();
                    renderYearView();
                    window.editingEventId = null;
                }
            } else {
                // Create new event
                const newEvent = {
                    id: Date.now().toString(),
                    key: eventKey,
                    calendarId: selectedCalendarId,
                    year: year,
                    month: month,
                    day: day,
                    name: name,
                    time: time,
                    location: location,
                    notes: notes
                };
                saveEvent(newEvent);
            }
            
            // Remove editing class from all event cards before closing
            document.querySelectorAll('.event-card').forEach(card => {
                card.classList.remove('editing');
            });
            
            // Clear form and hide it
            hideEventForm();
            // Reset button text
            const saveBtn = document.getElementById('saveEventBtn');
            if (saveBtn) {
                saveBtn.textContent = 'Save Event';
            }
            // Show the "Add New Event" button again
            const addBtn = document.querySelector('.add-event-btn-side');
            if (addBtn) {
                addBtn.style.display = '';
            }
            // Reopen modal to refresh the list
            openEventModal(month, day);
        }

        function deleteEventById(eventId) {
            const event = events.find(e => e.id === eventId);
            if (event) {
                deleteEvent(eventId);
                // Reopen modal to refresh the list
                openEventModal(event.month, event.day);
            }
        }

        // Make functions available globally for onclick handlers
        window.deleteEventById = deleteEventById;
        window.saveEventFromModal = saveEventFromModal;
        window.closeEventModal = closeEventModal;

        // Close modal when clicking outside
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('dayModal');
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeDayModal();
                }
            });
            
            const eventModal = document.getElementById('eventModal');
            eventModal.addEventListener('click', (e) => {
                if (e.target === eventModal) {
                    closeEventModal();
                }
            });
        });

        function updateNavButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            if (currentView === 'day') {
                const daysInMonth = getDaysInMonth(2026, currentMonth);
                prevBtn.disabled = currentDay === 1 && currentMonth === 0;
                nextBtn.disabled = currentDay === daysInMonth && currentMonth === 11;
            }
        }

        document.getElementById('prevBtn').onclick = () => {
            if (currentView === 'day') {
                if (currentDay > 1) {
                    renderDayView(currentMonth, currentDay - 1);
                } else if (currentMonth > 0) {
                    const prevMonthDays = getDaysInMonth(2026, currentMonth - 1);
                    renderDayView(currentMonth - 1, prevMonthDays);
                }
            }
        };

        document.getElementById('nextBtn').onclick = () => {
            if (currentView === 'day') {
                const daysInMonth = getDaysInMonth(2026, currentMonth);
                if (currentDay < daysInMonth) {
                    renderDayView(currentMonth, currentDay + 1);
                } else if (currentMonth < 11) {
                    renderDayView(currentMonth + 1, 1);
                }
            }
        };

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            // Handle "Mark Today" shortcut (M key) when in year view
            if (currentView === 'year') {
                // Don't trigger if user is typing in an input field
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                    return;
                }
                
                if (e.key === 'm' || e.key === 'M') {
                    const canMark = (currentMode === 'habits' && habitTrackerEnabled && selectedHabitId) ||
                                   (currentMode === 'events' && selectedCalendarId);
                    if (canMark) {
                        e.preventDefault();
                        markToday();
                        return;
                    }
                }
            }
            
            // Only handle arrow keys if we're not in year view
            if (currentView === 'year') return;
            
            // Prevent default if we're handling the key
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                const prevBtn = document.getElementById('prevBtn');
                const nextBtn = document.getElementById('nextBtn');
                
                if (e.key === 'ArrowLeft' && !prevBtn.disabled) {
                    prevBtn.click();
                } else if (e.key === 'ArrowRight' && !nextBtn.disabled) {
                    nextBtn.click();
                }
            }
        });

        // Initialize calendar view
        try {
            renderYearView();
        } catch (error) {
            console.error('Error rendering calendar:', error);
            // Still try to show something
            const calendar = document.getElementById('calendar');
            if (calendar) {
                calendar.innerHTML = '<p>Error loading calendar. Please check the console.</p>';
            }
        }
    </script>
</body>
</html>
